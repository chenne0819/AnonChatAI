{% extends "base.html" %}

{% block title %}開始配對 - 智能社交系統{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <h1 class="card-title text-center mb-4">建立你的個人檔案</h1>
                    <p class="text-center text-muted mb-5">請填寫以下資訊，讓我們為你找到最合適的朋友！</p>

                    <form method="post" action="/register">
                        <div class="mb-4">
                            <label class="form-label fw-bold">今日用餐目的 <span class="text-danger">*</span></label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="meal_purpose" id="purpose_eat" value="eat" required>
                                <label class="form-check-label" for="purpose_eat">單純吃飯</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="meal_purpose" id="purpose_chat" value="chat" required>
                                <label class="form-check-label" for="purpose_chat">吃飯並與他人聊天</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">性別 <span class="text-danger">*</span></label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="gender_male" value="male" required>
                                <label class="form-check-label" for="gender_male">男性</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="gender_female" value="female" required>
                                <label class="form-check-label" for="gender_female">女性</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">個性 <span class="text-danger">*</span></label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="personality" id="p_very_extrovert" value="very_extrovert" required>
                                <label class="form-check-label" for="p_very_extrovert">非常外向</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="personality" id="p_extrovert" value="extrovert" required>
                                <label class="form-check-label" for="p_extrovert">外向</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="personality" id="p_introvert" value="introvert" required>
                                <label class="form-check-label" for="p_introvert">內向</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="personality" id="p_very_introvert" value="very_introvert" required>
                                <label class="form-check-label" for="p_very_introvert">非常內向</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="interest1" class="form-label fw-bold">興趣 (請至少填寫一項) <span class="text-danger">*</span></label>
                            <input type="text" class="form-control mb-2" id="interest1" name="interest1" placeholder="興趣1" required>
                            <input type="text" class="form-control mb-2" id="interest2" name="interest2" placeholder="興趣2 (選填)">
                            <input type="text" class="form-control" id="interest3" name="interest3" placeholder="興趣3 (選填)">
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-bold">希望的聊天對象傾向 <span class="text-danger">*</span></label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="chat_preference" id="pref_male" value="male" required>
                                <label class="form-check-label" for="pref_male">男性</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="chat_preference" id="pref_female" value="female" required>
                                <label class="form-check-label" for="pref_female">女性</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="chat_preference" id="pref_any" value="any" required>
                                <label class="form-check-label" for="pref_any">皆可</label>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-magic me-2"></i>完成並尋找夥伴</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
