<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}智能社交系統{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .footer {
            background-color: #f8f9fa;
            padding: 40px 0;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <header class="d-flex justify-content-center py-3 border-bottom shadow-sm">
      <ul class="nav nav-pills">
        <li class="nav-item"><a href="/home" class="nav-link {% if request.path == '/home' or request.path == '/' %}active{% endif %}">首頁</a></li>
        <li class="nav-item"><a href="/register" class="nav-link {% if request.path == '/register' %}active{% endif %}">開始配對</a></li>
        <li class="nav-item"><a href="/about" class="nav-link {% if request.path == '/about' %}active{% endif %}">關於我們</a></li>

      </ul>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer text-muted">
        <div class="container">
            <div class="row">
                <div class="col-lg-4 mb-3">
                    <h5>智能社交系統</h5>
                    <p>在這裡，遇見志同道合的新朋友。</p>
                </div>
                <div class="col-lg-2 offset-lg-1 mb-3">
                    <h5>快速連結</h5>
                    <ul class="list-unstyled">
                        <li><a href="/home" class="text-muted text-decoration-none">首頁</a></li>
                        <li><a href="/register" class="text-muted text-decoration-none">開始配對</a></li>
                        <li><a href="/about" class="text-muted text-decoration-none">關於我們</a></li>
                    </ul>
                </div>
                <div class="col-lg-4 offset-lg-1 mb-3">
                    <h5>聯絡我們</h5>
                    <p>
                        <i class="fas fa-map-marker-alt"></i> AnonChatAI Team
                        <br>
                        <i class="fas fa-envelope"></i> cucuchen105@gmail.com
                    </p>
                </div>
            </div>
            <div class="text-center mt-3 border-top pt-3">
                Copyright &copy; 2025 AnonChatAI Team. All rights reserved.
            </div>
        </div>
    </footer>

    {% block scripts %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
        });
    </script>
    {% endblock %}
</body>
</html>
